  # 网页搜索工具 (使用 DuckDuckGo，无需 API key)
#  - name: web_search
#    group: web
#    use: deerflow.community.ddg_search.tools:web_search_tool
#    max_results: 5
#    # 搜索区域: cn-zh (中文), wt-wt (全球), us-en (英文)
#    region: cn-zh

  # 网页抓取工具 (使用 Jina AI reader)
  #- name: web_fetch
  #  group: web
  #  use: deerflow.community.jina_ai.tools:web_fetch_tool
  #  timeout: 30

  # 图片搜索工具 (使用 DuckDuckGo)
#  - name: image_search
#    group: web
#    use: deerflow.community.image_search.tools:image_search_tool
#    max_results: 5

  # 文件操作工具
  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  # Bash 执行工具
  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

# ============================================================================
# Sandbox 配置 (Docker容器模式)
# ============================================================================
sandbox:
  use: deerflow.community.aio_sandbox:AioSandboxProvider
  image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
  # replicas: 3                    # 最大并发容器数，默认3
  # idle_timeout: 600              # 空闲超时(秒)，默认600
  # 挂载 officecli 到 sandbox 容器
  mounts:
    - host_path: /root/.local/bin/officecli
      container_path: /usr/local/bin/officecli
      read_only: true
  # .NET 全球化不变模式，避免 ICU 依赖
  environment:
    DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"

# ============================================================================
# Skills 配置
# ============================================================================
skills:
  container_path: /mnt/skills

# ============================================================================
# 标题生成配置
# ============================================================================
title:
  enabled: false
  max_words: 6
  max_chars: 60
  model_name: null

# ============================================================================
# 建议生成配置
# ============================================================================
suggestions:
  enabled: false
  model_name: null
  max_suggestions: 3

# ============================================================================
# 摘要配置
# ============================================================================
summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: |
    请用中文总结以下对话历史，提取最重要的上下文信息。
    要求：
    1. 使用中文输出
    2. 提取用户的核心需求和目标
    3. 总结已完成的关键操作和结果
    4. 保留重要的技术细节、文件路径、代码片段等
    5. 省略无关的闲聊和重复内容
    请直接输出摘要内容，不要添加任何前缀或说明。

# ============================================================================
# 记忆配置
# ============================================================================
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

# ============================================================================
# Checkpointer 配置
# ============================================================================
checkpointer:
  type: sqlite
  connection_string: checkpoints.db
