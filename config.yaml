# ============================================================================
# 工具组配置
# ============================================================================
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# 工具配置
# ============================================================================
tools:
  # 网页搜索工具 (使用 DuckDuckGo，无需 API key)
  - name: web_search
    group: web
    use: deerflow.community.aliyun_opensearch.tools:web_search_tool
    top_k: 5
